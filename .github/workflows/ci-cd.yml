name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Backend Setup
    - name: Use Node.js for Backend
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: be/package-lock.json

    - name: Install Backend Dependencies
      working-directory: ./be
      run: npm ci

    - name: Backend Security Audit
      working-directory: ./be
      run: npm audit --audit-level=high
      continue-on-error: true  # Don't block builds; just report

    - name: Run Backend Tests
      working-directory: ./be
      run: npm test

    # Frontend Setup
    - name: Use Node.js for Frontend
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: fe/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: ./fe
      run: npm ci

    - name: Lint Frontend
      working-directory: ./fe
      run: npm run lint

    - name: Run Frontend Tests
      working-directory: ./fe
      run: npm test

    - name: Build Frontend
      working-directory: ./fe
      run: npm run build

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    # Enable Docker layer caching for faster rebuilds
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./be
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/crop-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Frontend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./fe
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/crop-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max


